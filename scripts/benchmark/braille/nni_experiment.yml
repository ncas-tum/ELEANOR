search_space:
  k:
    _type: loguniform
    _value: [ 0.1, 100 ]
  nb_hidden:
    _type: choice
    _value: [16, 32, 64, 128, 256, 512]
  tau_mem:
    _type: uniform
    _value: [0.001, 0.1]
  tau_syn:
    _type: uniform
    _value: [0.001, 0.1]
  I_dsc:
    _type: uniform
    _value: [ 0.000000000001, 0.000000000100 ]
  V_thr:
    _type: uniform
    _value: [ 1.5, 2.5 ]
  reg:
    _type: uniform
    _value: [0, 100]
  # P_s:
  #   _type: uniform
  #   _value: [ 0.1, 0.3 ]
  lr:
    _type: loguniform
    _value: [ 0.0000001, 0.1 ]
  felif_weight_scale:
    _type: loguniform
    _value: [0.1, 1000.0]
  enc_weight_scale:
    _type: loguniform
    _value: [0.1, 1000.0]
  # optimizer:
  #   _type: choice
  #   _value: ["adamax", "sgd"]

trial_command: python braille.py --nni --nb_epochs 50
trial_code_directory: .
trial_concurrency: 1
max_trial_number: 500

tuner:
  name: TPE
  class_args:
    optimize_mode: maximize

training_service:
  platform: local
